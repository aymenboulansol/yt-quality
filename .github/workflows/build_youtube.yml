name: Build Tweak and Inject into YouTube

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct URL to YouTube IPA'
        required: true
        default: 'https://github.com/theduckotech/YouTube-Decrypted/releases/download/v19.11.3/YouTube_19.11.3_Decrypted.ipa'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Theos and SDK
        run: |
          # تحميل بيئة Theos
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          
          # تحميل الـ SDK النظيف
          mkdir -p ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git /tmp/sdks
          cp -r /tmp/sdks/iPhoneOS16.5.sdk ~/theos/sdks/
          rm -rf /tmp/sdks

      - name: Install YouTube Headers
        run: |
          # تحميل الـ Headers ووضعها في مجلد include الخاص بـ Theos ليتعرف عليها المترجم فوراً
          git clone https://github.com/PoomSmart/YouTubeHeader.git /tmp/YouTubeHeader
          mkdir -p ~/theos/include/YouTubeHeader
          cp -r /tmp/YouTubeHeader/*.h ~/theos/include/YouTubeHeader/
          rm -rf /tmp/YouTubeHeader

      - name: Build Tweak
        run: |
          git clone https://github.com/PoomSmart/YouChooseQuality.git BuildTweak
          cd BuildTweak
          export THEOS=~/theos
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless ARCHS=arm64
          find .theos/obj/ -name "*.dylib" -exec cp {} ../YourTweak.dylib \;
          cd ..

      - name: Install Azule
        run: |
          brew install dpkg ldid
          git clone https://github.com/Al4ise/Azule ~/Azule
          sudo ln -sf ~/Azule/azule /usr/local/bin/azule

      - name: Download and Inject
        run: |
          curl -L "${{ github.event.inputs.ipa_url }}" -o YouTube.ipa
          azule -i YouTube.ipa -f YourTweak.dylib -o output/ -e

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Modified
          path: output/*.ipa
