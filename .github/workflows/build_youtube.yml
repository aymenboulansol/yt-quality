name: Build Tweak and Inject into YouTube

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct URL to YouTube IPA'
        required: true
        default: 'https://github.com/theduckotech/YouTube-Decrypted/releases/download/v19.11.3/YouTube_19.11.3_Decrypted.ipa'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Theos and SDKs
        run: |
          # 1. تحميل Theos مباشرة
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          
          # 2. تحميل مجلد الـ SDKs بالكامل لتجنب أخطاء فك الضغط والروابط المكسورة
          rm -rf ~/theos/sdks
          git clone https://github.com/theos/sdks.git ~/theos/sdks

      - name: Build Tweak
        run: |
          git clone https://github.com/PoomSmart/YouChooseQuality.git BuildTweak
          cd BuildTweak
          export THEOS=~/theos
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless ARCHS=arm64
          find .theos/obj/ -name "*.dylib" -exec cp {} ../YourTweak.dylib \;
          if [ -d "layout/Library/Application Support" ]; then
            mkdir -p ../TweakResources
            cp -r "layout/Library/Application Support/"* ../TweakResources/
          fi
          cd ..

      - name: Install Azule
        run: |
          brew install dpkg ldid
          git clone https://github.com/Al4ise/Azule ~/Azule
          sudo ln -sf ~/Azule/azule /usr/local/bin/azule

      - name: Download and Inject
        run: |
          curl -L "${{ github.event.inputs.ipa_url }}" -o YouTube.ipa
          if [ -d "TweakResources" ]; then
            azule -i YouTube.ipa -f YourTweak.dylib -r TweakResources -o output/ -e
          else
            azule -i YouTube.ipa -f YourTweak.dylib -o output/ -e
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Modified
          path: output/*.ipa
