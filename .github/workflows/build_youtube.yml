name: Build Tweak and Inject into YouTube

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct URL to YouTube IPA'
        required: true
        default: 'https://files.catbox.moe/r6c7qd.ipa'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install ldid dpkg

      - name: Setup Theos and SDK
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          mkdir -p ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git /tmp/sdks
          cp -r /tmp/sdks/iPhoneOS16.5.sdk ~/theos/sdks/
          git clone --depth 1 https://github.com/PoomSmart/YouTubeHeader.git ~/theos/include/YouTubeHeader
          git clone --depth 1 https://github.com/PoomSmart/PSHeader.git ~/theos/include/PSHeader

      - name: Build Tweak
        run: |
          git clone https://github.com/PoomSmart/YouChooseQuality.git BuildTweak
          cd BuildTweak
          export THEOS=~/theos
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless ARCHS=arm64
          # البحث عن الملف الناتج في أي مسار فرعي
          find .theos/obj -name "*.dylib" -exec cp {} ../YourTweak.dylib \;
          cd ..

      - name: Install Azule and Inject
        run: |
          git clone https://github.com/Al4ise/Azule ~/Azule
          sudo ln -sf ~/Azule/azule /usr/local/bin/azule
          
          # تحميل الملف مع التحقق من الرابط
          curl -L -f "${{ github.event.inputs.ipa_url }}" -o YouTube.ipa
          
          # إنشاء مجلد المخرجات والتأكد من وجود ملف التعديل
          mkdir -p output
          if [ -f "YourTweak.dylib" ]; then
            azule -i YouTube.ipa -o output -f YourTweak.dylib
          else
            echo "Error: YourTweak.dylib not found!"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Modified
          path: output/*.ipa
